<header class="sticky top-0 z-20 h-16 bg-surface-container-lowest border-b border-outline-variant flex items-center justify-between gap-4 px-6">

  <!-- Marca ERP -->
  <div class="flex items-center gap-2 shrink-0">
    <span class="material-symbols-outlined text-primary text-[26px]">hardware</span>
    <span class="font-extrabold text-on-surface tracking-tight hidden md:inline">Ferretex Pro <span class="text-primary">ERP</span></span>
  </div>

  <!-- Búsqueda global -->
  <div class="relative flex-1 max-w-xl">
    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
      <span class="material-symbols-outlined text-outline text-[20px]">search</span>
    </div>
    <input
      type="text"
      [(ngModel)]="search"
      (keyup.enter)="buscar()"
      placeholder="Buscar productos por nombre o código..."
      class="w-full h-10 pl-10 pr-3 bg-surface-container border border-transparent rounded-md text-body-md text-on-surface placeholder:text-on-surface-variant/70 outline-none transition-colors focus:border-primary focus:bg-surface-container-lowest"
    />
  </div>

  <!-- Acciones -->
  <div class="flex items-center gap-1 sm:gap-2 shrink-0">
    <button
      type="button"
      aria-label="Historial"
      class="hidden sm:flex w-10 h-10 items-center justify-center rounded-full text-on-surface-variant hover:bg-surface-container hover:text-primary transition-colors"
    >
      <span class="material-symbols-outlined text-[22px]">history</span>
    </button>

    <button
      type="button"
      aria-label="Notificaciones"
      class="relative w-10 h-10 flex items-center justify-center rounded-full text-on-surface-variant hover:bg-surface-container hover:text-primary transition-colors"
    >
      <span class="material-symbols-outlined text-[22px]">notifications</span>
      <span class="absolute top-2 right-2 w-2 h-2 bg-primary rounded-full ring-2 ring-surface-container-lowest"></span>
    </button>

    <div class="w-px h-6 bg-outline-variant mx-1 hidden sm:block"></div>

    <button
      type="button"
      aria-label="Cuenta"
      class="w-9 h-9 flex items-center justify-center rounded-full bg-primary/15 text-primary hover:bg-primary/25 transition-colors"
    >
      <span class="material-symbols-outlined text-[22px]">account_circle</span>
    </button>

    <div class="hidden sm:flex flex-col items-start leading-tight pl-1">
      <span class="text-sm font-bold text-on-surface">{{ (user$ | async)?.username || 'Usuario' }}</span>
      <span class="text-[10px] font-semibold uppercase tracking-wider text-primary">{{ (user$ | async)?.roles?.[0] || 'Usuario' }}</span>
    </div>
  </div>
</header>
